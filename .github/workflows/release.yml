name: Release

# Publishes to npm when you push a version tag, e.g.:
#   npm version 0.1.0 --no-git-tag-version   # bump package.json if needed
#   git commit -am "Release 0.1.0" && git tag v0.1.0 && git push --tags
#
# Nothing publishes from a laptop — the registry credential lives only in the
# repo secret NPM_TOKEN (an npm automation token for the @payslice org).
#
# The tag must match the version in package.json, or the job fails before
# publishing.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # reserved for npm provenance once the repo is public

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      # Full gate before anything goes to the registry.
      - run: npm run generate:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
