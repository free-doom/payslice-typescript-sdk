name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail if the vendored openapi.yaml and the generated types have drifted.
      - run: npm run generate:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
